services:
  postgres:
    image: postgres:16-alpine
    container_name: portaldainformatica-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: portaldainformatica
      POSTGRES_PASSWORD: portaldainformatica
      POSTGRES_DB: portaldainformatica
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portaldainformatica"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: portaldainformatica-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: portaldainformatica-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"

  adminer:
    image: adminer:latest
    container_name: portaldainformatica-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
